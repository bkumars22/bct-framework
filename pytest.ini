[pytest]
# agent-trust/ is a separate FastAPI project with its own `api`/`core`
# packages and its own test run (`cd agent-trust && pytest`). Excluding it
# here isn't just tidiness: agent-trust/api has an __init__.py (a regular
# package), and if anything on the collection path ever puts agent-trust/
# on sys.path in the same process as this repo's root-level `api/`
# (a namespace package, no __init__.py), the regular package permanently
# shadows the namespace one for the rest of the interpreter session —
# breaking `import api.main` in tests/test_api.py with no obvious cause.
norecursedirs = agent-trust .* build dist node_modules {arch} CVS _darcs *.egg venv
